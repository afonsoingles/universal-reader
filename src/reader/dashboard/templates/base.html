<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Universal Reader{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
        h1 { font-size: 1.75rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.25rem; }
        h2 { font-size: 1.25rem; font-weight: 600; color: #cbd5e1; margin: 1.5rem 0 0.75rem; }
        nav { display: flex; gap: 1rem; margin-bottom: 2rem; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; padding: 0.4rem 0.8rem; border-radius: 0.375rem; border: 1px solid #334155; }
        nav a:hover { background: #1e293b; color: #e2e8f0; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; }
        .badge-active { background: #14532d; color: #86efac; }
        .badge-hibernated { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .badge-reading { background: #1e3a5f; color: #93c5fd; }
        .badge-awaiting { background: #1e3a5f; color: #93c5fd; }
        .badge-failure { background: #450a0a; color: #fca5a5; }
        .badge-disabled { background: #431407; color: #fdba74; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        .stat { }
        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; margin-top: 0.2rem; }
        .ws-on { color: #86efac; }
        .ws-off { color: #fca5a5; }
        .btn { display: inline-block; padding: 0.5rem 1.25rem; border-radius: 0.5rem; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: opacity 0.15s; }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .btn-warning { background: #f59e0b; color: #0f172a; }
        .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .log-container { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.5rem; padding: 1rem; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; }
        .log-entry { margin-bottom: 0.3rem; line-height: 1.5; }
        .log-info { color: #94a3b8; }
        .log-warn { color: #fbbf24; }
        .log-error { color: #f87171; }
        .log-time { color: #64748b; margin-right: 0.5rem; }
        .log-event { color: #e2e8f0; font-weight: 500; margin-right: 0.5rem; }
        .log-detail { color: #94a3b8; }
        .msg { padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.875rem; }
        .msg-success { background: #14532d; color: #86efac; }
        .msg-error { background: #450a0a; color: #fca5a5; }
        input[type=text], input[type=password], input[type=number] {
            background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
            padding: 0.5rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; width: 100%;
        }
        input:focus { outline: none; border-color: #3b82f6; }
        label { font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 0.3rem; }
        .form-group { margin-bottom: 1rem; }
        .warn-box { background: #431407; border: 1px solid #ea580c; border-radius: 0.5rem; padding: 1rem; color: #fdba74; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
